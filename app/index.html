<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GENESIS</title>
    <!--
      main.tsx es el punto de entrada de React.
      Vite lo procesa como módulo ESM y también bundlea los CSS que se importen desde ahí.
    -->
    <script type="module" src="/src/main.tsx" defer></script>
  </head>
  <body>
    <!--
      React necesita un elemento del DOM donde "anclarse".
      ReactDOM.createRoot(document.getElementById('root')) busca este div
      y monta toda la aplicación dentro de él.
    -->
    <div id="root"></div>
  </body>
</html>
